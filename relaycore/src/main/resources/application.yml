server:
    port: 8080

spring:
    application:
        name: relaycore
        

# 1. Enable Virtual Threads for Scalability
    threads:
        virtual:
            enabled: true

# 2. Database Configuration (PostgreSQL 17)
    datasource:
        url: jdbc:postgresql://localhost:5432/relaycore
        username: postgres
        password: root
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update # Automatically creates tables based on your Java Entities
        show-sql: true
        properties:
            hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect

# 3. Kafka Configuration
    kafka:
        bootstrap-servers: localhost:9092
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer
            acks: all # Ensures data is safely written to Kafka before confirming
        consumer:
            group-id: relaycore-group
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        properties:
            spring.json.trusted.packages: "*"
        listener:
            async-acks: true # High performance

# 4. Monitoring (Actuator)
management:
    endpoints:
        web:
            exposure:
                include: health, info, metrics